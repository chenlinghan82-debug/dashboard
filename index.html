<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pillar 6 Digital Trade Dashboard</title>
    <style>
        body { font-family: 'Inter', sans-serif; line-height: 1.6; color: #333; max-width: 1000px; margin: auto; padding: 20px; background: #f8f9fa; }
        .card { background: #fff; border-radius: 12px; padding: 30px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #1a237e; text-align: center; border-bottom: 3px solid #1a237e; padding-bottom: 10px; }
        h2 { color: #283593; border-left: 5px solid #3f51b5; padding-left: 15px; }
        img { width: 100%; height: auto; border-radius: 8px; margin-top: 15px; }
        .btn { display: inline-block; background: #ff5722; color: #fff; padding: 12px 24px; text-decoration: none; border-radius: 25px; font-weight: bold; margin: 10px 0; }
        .video-container { background: #000; border-radius: 8px; overflow: hidden; margin-top: 15px; }
    </style>
</head>
<body>
    <h1>Digital Trade Policy Dashboard: Pillar 6</h1>

    <div class="card">
        <h2>1. Analytical Flowchart</h2>
        <p>Quantifying legal frameworks into digital trade scores.</p>
        <img src="flowchart.jpg" alt="Pillar 6 Flowchart">
    </div>

    <div class="card">
        <h2>2. Key Findings & Presentation</h2>
        <p>Strategic insights based on ESCAP 2025 guidelines.</p>
        <a href="presentation.pdf" class="btn" target="_blank">View Full Presentation (PDF)</a>
    </div>

    <div class="card">
        <h2>3. Video Demonstration</h2>
        <div class="video-container">
            <video controls style="width: 100%;">
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>
    </div>
</body>
</html>
